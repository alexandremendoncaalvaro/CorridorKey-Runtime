name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
title: "[Feature] "
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for CorridorKey Runtime? We would love to hear it.
        Describe the problem you are trying to solve and how you imagine
        the solution working.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: |
        What problem does this feature solve? What workflow is painful or
        impossible today?
      placeholder: |
        I work with DPX sequences daily but the runtime only supports EXR
        and PNG, so I have to convert everything before running inference.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work? Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: |
        Other approaches you thought about and why they fall short.
        This helps us understand the full picture.

  - type: dropdown
    id: platform
    attributes:
      label: Target Platform
      description: Which platform(s) would benefit from this feature?
      multiple: true
      options:
        - macOS
        - Windows
        - Linux
        - All

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: |
        References, mockups, links to similar features in other tools,
        or example files that illustrate the use case.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
