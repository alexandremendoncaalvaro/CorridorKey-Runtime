name: Release Validation

# Why this workflow exists
# ------------------------
# CI (.github/workflows/ci.yml) validates that the source tree compiles and
# unit tests pass. It does NOT touch the packaged release artifact. The
# pre-release v0.7.4 shipped a release-notes file that named binaries that
# were never uploaded as assets, and the gap was discovered by users, not by
# CI. This workflow is the gate that prevents that class of regression: it
# builds the release artifact, extracts it on a fresh runner outside the
# source tree, runs the binary, and lints the release notes against the
# actual asset manifest.
#
# Triggers
# --------
# - pull_request to main: Tier 2 — must pass before a PR can merge.
# - push to main:         Tier 2 — confirms main is shippable at all times.
# - push of v* tag:       Tier 3 — runs everything Tier 2 does plus the
#                         signing/notarization dry-run gate.
#
# The release-notes linter BLOCKS at every tier. It is intentionally strict
# because the failure mode it prevents is invisible to traditional CI:
# release notes are documentation, and a doc that promises a binary that
# does not exist is a worse defect than a code bug — it ships the wrong
# product to users.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Fork PRs cannot read secrets and cannot sign artifacts. They also represent
# a public-repo attack surface for any self-hosted runner we add later. Gate
# the heavy jobs to repo-owned refs so a malicious fork cannot trigger a
# packaging build.
jobs:
  # =========================================================================
  # Tier 2 — Build and validate the actual release artifact.
  # =========================================================================

  build-artifact-mac:
    name: Build Artifact (macOS)
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: macos-14
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 1e199d32ad53aab1defda61ce41c380302e3f95c

      - name: Cache ONNX Runtime (macOS)
        id: cache-ort-mac
        uses: actions/cache@v4
        with:
          path: vendor/onnxruntime/lib
          key: ort-macos-arm64-1.24.3

      - name: Fetch ONNX Runtime (macOS)
        if: steps.cache-ort-mac.outputs.cache-hit != 'true'
        run: |
          mkdir -p vendor/onnxruntime
          curl -L -o ort.tgz https://github.com/microsoft/onnxruntime/releases/download/v1.24.3/onnxruntime-osx-arm64-1.24.3.tgz
          tar -xzf ort.tgz --strip-components=1 -C vendor/onnxruntime
          rm ort.tgz

      - name: Cache OpenFX SDK
        id: cache-openfx-mac
        uses: actions/cache@v4
        with:
          path: vendor/openfx
          key: openfx-sdk-v1

      - name: Fetch OpenFX SDK
        if: steps.cache-openfx-mac.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/AcademySoftwareFoundation/openfx vendor/openfx

      - name: Build release artifact
        # --skip-tests because Tier 1 (ci.yml) already ran tests on the same
        # commit. Tier 2 is specifically about packaging integrity.
        run: bash scripts/release_pipeline_macos.sh --skip-tests

      - name: Generate asset manifest
        # The manifest is the source of truth that the release-notes linter
        # checks against. One filename per line, no paths.
        run: |
          cd dist
          find . -maxdepth 2 -type f \( -name '*.zip' -o -name '*.dmg' -o -name '*.pkg' \) \
            -exec basename {} \; | sort -u > asset_manifest.txt
          echo "--- packaged macOS assets ---"
          cat asset_manifest.txt

      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac
          path: |
            dist/*.zip
            dist/*.dmg
            dist/*.pkg
            dist/asset_manifest.txt
          if-no-files-found: error
          retention-days: 14

  build-artifact-windows:
    name: Build Artifact (Windows)
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: windows-2022
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC developer environment
        # Same reason as ci.yml: the windows-2022 image has MinGW on PATH and
        # the outer cmake probe will pick g++ if MSVC is not activated first.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 1e199d32ad53aab1defda61ce41c380302e3f95c

      - name: Cache ONNX Runtime (Windows DirectML)
        id: cache-ort-win
        uses: actions/cache@v4
        with:
          path: vendor/onnxruntime-windows-dml
          key: ort-windows-dml-1.23.0

      - name: Fetch ONNX Runtime (DirectML)
        if: steps.cache-ort-win.outputs.cache-hit != 'true'
        run: ./scripts/sync_onnxruntime_directml.ps1 -Version 1.23.0
        shell: pwsh

      - name: Cache curated RTX runtime
        id: cache-ort-rtx
        uses: actions/cache@v4
        with:
          path: vendor/onnxruntime-windows-rtx
          # The curated RTX runtime is built by prepare_windows_rtx_release.ps1
          # at release time and is normally NOT regenerated in CI. Cache it
          # under a key keyed on the package version so a manual re-cut bumps
          # the key. If the cache misses, the release pipeline will fail with
          # a clear error and a maintainer must run the prepare script.
          key: ort-windows-rtx-v1
          # Don't fall back to a stale prefix — a stale RTX runtime would
          # silently package the wrong ONNX Runtime version.

      - name: Build release artifact (RTX track)
        # Track rtx only. DirectML is intentionally out of scope until we
        # actually ship a DirectML asset (see release-notes linter scope rule).
        run: pwsh scripts/release_pipeline_windows.ps1 -Track rtx -SkipTests
        shell: pwsh

      - name: Generate asset manifest
        run: |
          $manifest = Get-ChildItem -Path dist -Recurse -File `
              -Include *.exe,*.zip,*.msi `
              | ForEach-Object { $_.Name } `
              | Sort-Object -Unique
          $manifest | Set-Content -Path dist/asset_manifest.txt -Encoding ascii
          Write-Host "--- packaged Windows assets ---"
          Get-Content dist/asset_manifest.txt
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.msi
            dist/asset_manifest.txt
          if-no-files-found: error
          retention-days: 14

  smoke-mac:
    name: Smoke (macOS clean-room)
    needs: build-artifact-mac
    runs-on: macos-14
    # Fresh runner = clean room. Importantly, do NOT check out the source
    # tree so the smoke cannot accidentally satisfy a missing-resource bug
    # by reading from $REPO_ROOT.
    steps:
      - name: Fetch only the smoke script
        # Pull JUST the script, not the full repo. The CLI binary must be
        # self-contained.
        run: |
          mkdir -p smoke
          curl -L -o smoke/smoke_extract_and_run.sh \
            "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/scripts/smoke_extract_and_run.sh"
          chmod +x smoke/smoke_extract_and_run.sh

      - uses: actions/download-artifact@v4
        with:
          name: dist-mac
          path: artifacts

      - name: Run smoke against every packaged artifact
        run: |
          shopt -s nullglob
          found=0
          for asset in artifacts/*.zip artifacts/*.dmg artifacts/*.pkg; do
            found=1
            echo "::group::smoke $(basename "$asset")"
            ./smoke/smoke_extract_and_run.sh "$asset"
            echo "::endgroup::"
          done
          if [ "$found" = "0" ]; then
            echo "error: no packaged macOS artifacts to smoke" >&2
            exit 1
          fi

  smoke-windows:
    name: Smoke (Windows clean-room)
    needs: build-artifact-windows
    runs-on: windows-2022
    steps:
      - name: Fetch only the smoke script
        run: |
          New-Item -ItemType Directory -Path smoke -Force | Out-Null
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/scripts/smoke_extract_and_run.ps1" `
            -OutFile smoke/smoke_extract_and_run.ps1
        shell: pwsh

      - uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: artifacts

      - name: Run smoke against every packaged artifact
        run: |
          $assets = Get-ChildItem -Path artifacts -File -Include *.zip,*.exe,*.msi -Recurse `
            | Where-Object { $_.Name -ne 'asset_manifest.txt' }
          if (-not $assets) {
            Write-Error "no packaged Windows artifacts to smoke"
            exit 1
          }
          foreach ($asset in $assets) {
            Write-Host "::group::smoke $($asset.Name)"
            pwsh smoke/smoke_extract_and_run.ps1 $asset.FullName
            if ($LASTEXITCODE -ne 0) { throw "smoke failed for $($asset.Name)" }
            Write-Host "::endgroup::"
          }
        shell: pwsh

  lint-release-notes:
    name: Lint Release Notes
    needs: [build-artifact-mac, build-artifact-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-mac
          path: dist-mac

      - uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist-windows

      - name: Combine asset manifests
        run: |
          cat dist-mac/asset_manifest.txt dist-windows/asset_manifest.txt \
            | sort -u > combined_manifest.txt
          echo "--- combined release asset manifest ---"
          cat combined_manifest.txt

      - name: Lint
        # Exits non-zero on any violation. This is the gate that would have
        # caught the v0.7.4 DirectML installer mention.
        run: python3 scripts/lint_release_notes.py release_notes.md --assets-file combined_manifest.txt

  # =========================================================================
  # Tier 3 — Tag-push only. Adds signing/notarization dry-run on top.
  # =========================================================================

  signing-dryrun-mac:
    name: Signing Dry-Run (macOS)
    needs: [smoke-mac, lint-release-notes]
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist-mac
          path: dist

      - name: Inspect Mach-O integrity of every binary in the bundle
        # "Dry-run" intentionally does not require the Developer ID secret.
        # We verify the binary is *signable* (well-formed Mach-O, has the
        # expected segments) without producing a real signature. Real signing
        # happens in the manual release flow with secrets that fork PRs
        # cannot access.
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p inspect
          for asset in dist/*.zip dist/*.dmg; do
            [ -f "$asset" ] || continue
            echo "::group::mach-o inspect $(basename "$asset")"
            target="inspect/$(basename "$asset" .zip)"
            target="${target%.dmg}"
            mkdir -p "$target"
            case "$asset" in
              *.zip) ditto -x -k "$asset" "$target" ;;
              *.dmg) hdiutil attach "$asset" -mountpoint "$target/mount" -nobrowse -quiet
                     cp -R "$target/mount"/* "$target/"
                     hdiutil detach "$target/mount" -quiet ;;
            esac
            # Find every Mach-O and confirm `codesign --display` can read it.
            # A binary that codesign cannot parse will fail to notarize.
            while IFS= read -r bin; do
              file "$bin" | grep -q 'Mach-O' || continue
              echo "  inspect: $bin"
              codesign --display --verbose=2 "$bin" 2>&1 | head -5 || true
              # Verify the LC_CODE_SIGNATURE load command structure exists or
              # the binary is at least sign-ready (no truncated headers).
              if ! otool -l "$bin" >/dev/null 2>&1; then
                echo "error: $bin is not a parseable Mach-O" >&2
                exit 1
              fi
            done < <(find "$target" -type f -perm +111)
            echo "::endgroup::"
          done

  signing-dryrun-windows:
    name: Signing Dry-Run (Windows)
    needs: [smoke-windows, lint-release-notes]
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: windows-2022
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist

      - name: Inspect PE integrity of every installer
        # Dry-run: confirm signtool can parse the PE. A real signature is
        # applied later in the manual release flow with the EV cert.
        run: |
          $assets = Get-ChildItem -Path dist -Recurse -File -Include *.exe,*.msi
          if (-not $assets) { throw "no Windows assets to inspect" }
          # signtool ships with the Windows SDK installed on windows-2022.
          $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue)?.Source
          if (-not $signtool) {
            $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse `
                -Filter signtool.exe | Where-Object { $_.FullName -like '*x64*' } `
                | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $signtool) { throw "signtool.exe not found on runner" }
          foreach ($asset in $assets) {
            Write-Host "::group::pe inspect $($asset.Name)"
            # `signtool verify /pa /v` returns non-zero on unsigned binaries;
            # for dry-run we accept that and only fail on parse errors. Use
            # `signtool catdb` first to confirm the file is a parseable PE.
            & $signtool verify /pa /v $asset.FullName 2>&1 | Out-Host
            $rc = $LASTEXITCODE
            if ($rc -ne 0 -and $rc -ne 1) {
              # 0 = signed-and-valid, 1 = unsigned-or-invalid (expected in
              # dry-run), anything else = parse failure.
              throw "signtool exited with unexpected code $rc for $($asset.Name)"
            }
            Write-Host "::endgroup::"
          }
        shell: pwsh
