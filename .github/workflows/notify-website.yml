name: Notify Website

on:
  release:
    types:
      - published
      - released
      - prereleased
      - edited
      - unpublished
      - deleted
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "WEBSITE_DISPATCH_TOKEN secret is not configured; skipping dispatch."
            exit 0
          fi

          payload=$(jq -nc \
            --arg event "${EVENT_NAME}" \
            --arg action "${EVENT_ACTION}" \
            --arg tag "${RELEASE_TAG}" \
            --arg name "${RELEASE_NAME}" \
            --arg prerelease "${RELEASE_PRERELEASE}" \
            '{event_type: "runtime-release-updated", client_payload: {event: $event, action: $action, tag: $tag, name: $name, prerelease: $prerelease}}')

          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/alexandremendoncaalvaro/CorridorKey-Website/dispatches \
            -d "${payload}"
